<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 8 Codes | Know Yourself</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;500;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" id="flatpickr-theme" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <style>
        /* Base Reset & Variables */
        :root[data-theme="dark"] {
            --bg-color: #000000;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --border-color: #333333;
            --border-focus: #FFFFFF;
            --accent-color: #FFFFFF;
            --input-placeholder: #444444;
            --flatpickr-bg: #111;
            --flatpickr-border: #333;
            --toggle-bg: #222;
            --toggle-border: #444;
        }

        :root[data-theme="light"] {
            --bg-color: #F5F5F0;
            --text-main: #111111;
            --text-muted: #666666;
            --border-color: #CCCCCC;
            --border-focus: #111111;
            --accent-color: #111111;
            --input-placeholder: #AAAAAA;
            --flatpickr-bg: #fff;
            --flatpickr-border: #ccc;
            --toggle-bg: #e0e0e0;
            --toggle-border: #bbb;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--toggle-bg);
            border: 1px solid var(--toggle-border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s, border-color 0.3s;
            padding: 0;
            margin: 0;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
            border-color: var(--text-muted);
        }

        .diagnosis-container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .privacy-notice {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .required::after {
            content: " *";
            color: var(--text-muted);
        }

        .optional-tag {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        input {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 16px;
            font-size: 1rem;
            font-family: 'Barlow', sans-serif;
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 10px rgba(128, 128, 128, 0.2);
        }

        input::placeholder {
            color: var(--input-placeholder);
        }

        button[type="submit"] {
            width: 100%;
            background-color: var(--text-main);
            color: var(--bg-color);
            border: 1px solid var(--text-main);
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 16px;
            border-radius: 4px;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        button[type="submit"]:hover {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 32px 0;
            width: 100%;
        }

        /* Flatpickr 커스텀 오버라이드 */
        .flatpickr-calendar {
            font-family: 'Barlow', sans-serif !important;
            background: var(--flatpickr-bg) !important;
            border: 1px solid var(--flatpickr-border) !important;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>

    <div class="diagnosis-container">
        <h1>The 8 Codes | Strategic Diagnosis</h1>

        <div class="subtitle">Know Yourself. Obtain Your Blueprint.</div>
        <div class="description">
            Human data analysis requires precision. Enter your temporal coordinates to generate your objective blueprint.
        </div>
        <div class="privacy-notice">
            > Your data is strictly protected and used ONLY for this analysis.
        </div>

        <div class="divider"></div>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Name / Nickname <span class="optional-tag">(Optional)</span></label>
                <input type="text" id="name" name="name" placeholder="Enter your designation">
            </div>

            <div class="form-group">
                <label for="email" class="required">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@domain.com">
            </div>

            <div class="form-group">
                <label for="dob" class="required">Date & Time of Birth</label>
                <input type="text" id="dob" name="dob" required placeholder="YYYY-MM-DD HH:MM">
            </div>

            <button type="submit">Initialize Diagnosis</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        const html = document.documentElement;
        const toggleBtn = document.getElementById('themeToggle');
        const flatpickrThemeLink = document.getElementById('flatpickr-theme');

        // 저장된 테마 불러오기
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        toggleBtn.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        function setTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (theme === 'dark') {
                toggleBtn.textContent = '☀️';
                flatpickrThemeLink.href = 'https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css';
            } else {
                toggleBtn.textContent = '🌙';
                flatpickrThemeLink.href = 'https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/light.css';
            }
        }

        // 날짜 입력 필드에 Flatpickr 적용
        flatpickr("#dob", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            time_24hr: true,
            disableMobile: true,
            locale: "en"
        });
    </script>
</body>
</html>
